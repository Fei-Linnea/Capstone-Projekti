# =============================================================================
# Hippocampus Radiomic Feature Extraction Pipeline – Docker Compose
# =============================================================================
#
# Services:
#   backend  – Flask REST API (port 5000) + Snakemake pipeline runner
#   frontend – Next.js dev server (port 3000) with hot-reload
#
# IMPORTANT – Starting the pipeline:
#   Use the platform-specific startup script instead of plain docker compose:
#
#   Windows (PowerShell):   .\start.ps1
#   Linux / macOS:          ./start.sh
#
#   These scripts auto-detect your drives/filesystem and generate
#   docker-compose.override.yml with the correct volume mounts.
#
#   Alternatively, run:  docker compose up --build
#   (after the override file has been generated at least once)
#
# =============================================================================

services:
  # ── Flask Backend + Pipeline ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    container_name: hippocampus-backend
    ports:
      - "5000:5000"
    environment:
      - PIPELINE_DIR=/app/pipeline
      - LOG_BASE_DIR=/app/logs
      - DATA_DIR=/data
      - BROWSE_ROOT=/host
    volumes:
      - pipeline-logs:/app/logs           # persistent logs
      # Host filesystem volumes are added automatically by start.ps1 / start.sh
      # via docker-compose.override.yml.  You can also add them manually:
      #   - /path/to/data:/host/data
    restart: unless-stopped

  # ── Next.js Frontend (dev) ──────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: pipeline/web/frontend/Dockerfile
    container_name: hippocampus-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pipeline-logs:
    driver: local
