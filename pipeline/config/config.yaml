# ============================================================================
# Pipeline Configuration File - HSF Segmentation
# ============================================================================

# BIDS dataset root directory (where subjects are located)
# Default: /data (mounted from host)
bids_root: "/data"

# Derivatives output directory
derivatives_root: "/data/derivatives/"

# HSF segmentation parameters
hsf_params:
  contrast: "t1"  # MRI contrast type
  margin: "[8,8,8]"  # ROI localization margin in voxels [x,y,z]
  segmentation_mode: "single_fast"  # Options: single_fast, single_accurate, bagging_fast, bagging_accurate
  ca_mode: "1/2/3"  # CA subfield mode: "" (whole), "123" (merged CA), "1/23" (CA2+CA3 merged), "1/2/3" (all separate)

# Hemisphere and label definitions
hemis: ["L", "R"]
labels:
  DG: 1
  CA1: 2
  CA2: 3
  CA3: 4
  SUB: 5

# Processing options
continue_on_error: false

# Resource limits
cores: 4
memory_mb: 8000

# Mesh generation parameters (step 3)
mesh_params:
  min_voxel_count: 20
  smooth_iters: 50
  decimation_degree: 0.7
