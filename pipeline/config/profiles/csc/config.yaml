# Snakemake profile for CSC (Slurm, Apptainer support)

jobs: 100                           # Max parallel jobs
keep-going: true                    # Continue on individual job failures
latency-wait: 60                    # Wait for filesystem
restart-times: 1
printshellcmds: true

# Slurm cluster submission configuration
cluster: >
  sbatch
  -J {rule}
  -A {resources.account}
  -p {resources.partition}
  -t {resources.time}
  -c {threads}
  --mem={resources.mem_mb}
  --output=logs/slurm/%x-%j.out
  --error=logs/slurm/%x-%j.err

# Default resources for each job
# Note: Individual rules specify their own mem_mb, threads, and time.
# These are fallbacks and cluster-specific settings.
default-resources:
  mem_mb: 4000                      # Default memory (rules override this)
  time: "01:00:00"                  # Default time limit (rules override this)
  partition: "serial"               # Slurm partition
  account: "project_2001234"        # Replace with your CSC project ID

# Software deployment: Use Apptainer
use-conda: false
use-singularity: true              # Or: use-apptainer: true (Snakemake >= 7.29)

# Apptainer-specific settings
apptainer-args: "--bind=/users,/projappl,/scratch"