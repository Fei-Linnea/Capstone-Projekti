# Snakemake 8.x Profile for CSC Puhti - SLURM + Apptainer
# NOTE: This file is auto-generated by run_csc.py. Manual edits will be overwritten.
# Usage: python3 run_csc.py --project <NUMBER> --bids-root <PATH> --sif <PATH>

# SLURM executor
executor: slurm

# Job settings
jobs: 100
keep-going: true
latency-wait: 120
retries: 1
printshellcmds: true
rerun-incomplete: true
local-cores: 1

# Default SLURM resources
# tmpdir must be on shared storage (/scratch) — not /tmp which is node-local.
# Snakemake adds tmpdir to SINGULARITY_BIND; if it points to a login-node /tmp
# path the compute node can't mount it and Apptainer fails.
# These values are overwritten by run_csc.py with your project details.
default-resources:
  - slurm_account=project_REPLACE_ME
  - slurm_partition=small
  - mem_mb=8000
  - runtime=120
  - "tmpdir='/scratch/project_REPLACE_ME/REPLACE_ME/tmp'"

# Apptainer container support
software-deployment-method:
  - apptainer

# Explicitly bind /scratch as read-write (Snakemake's auto-binds may be read-only)
# Also set HSF cache location inside the container
# These values are overwritten by run_csc.py with your project path.
apptainer-args: "--bind /scratch/project_REPLACE_ME:/scratch/project_REPLACE_ME:rw --env HSF_HOME=/users/$USER/.hsf"
