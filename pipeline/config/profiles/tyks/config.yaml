# ============================================================================
# Snakemake Profile for TYKS - Single Machine with Apptainer
# ============================================================================
# 
# TYKS Environment:
#   - Single beefy machine (no cluster)
#   - No job scheduler (Slurm/PBS)
#   - Apptainer available for containerized execution
#   - Local bash execution only
#
# Usage (from inside Apptainer):
#   apptainer run \
#     --writable-tmpfs \
#     --bind /path/to/data:/data \
#     --bind ./logs:/app/logs \
#     hippocampus-pipeline.sif \
#     --cores 16 --batch-size 20
#
# ============================================================================

# Local execution settings (no cluster submission)
cores: 16                           # Max cores to use (adjust to machine)
keep-going: true                    # Continue on individual rule failures
printshellcmds: true                # Show commands being executed
rerun-incomplete: true              # Rerun jobs that were interrupted

# Latency settings (local filesystem - fast)
latency-wait: 5                     # Short wait for local filesystem

use-conda: false
use-singularity: false

# Restart failed jobs once
restart-times: 1
